name=BetterMenu
version=0.5.0
author=Trent M. Wyatt
maintainer=Trent M. Wyatt
sentence=Declarative inline-nested menu system for Arduino-class targets.
paragraph=BetterMenu defines complete multi-level menus in a single declaration, with editable integers, step sizes, read-only or getter/setter values, boolean toggles, fixed choices, callbacks, submenus, hidden/disabled conditions, change and persistence hooks, pluggable displays, rich render metadata, row/touch and encoder-style input events, configurable stream keys, button inputs, and non-blocking input providers.
