name: Arduino CI

on: [push, pull_request]

permissions:
  contents: read
  pull-requests: write

jobs:
  compile-examples:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Compile portable examples for Arduino Uno
        uses: arduino/compile-sketches@v1
        with:
          fqbn: arduino:avr:uno
          libraries: |
            - source-path: ./
            - name: LiquidCrystal
            - name: ButtonGestures
          sketch-paths: |
            examples/SerialMenu
            examples/DirectButtonsSerial
            examples/ButtonGesturesSerial
            examples/MultiLevelSingleDeclaration
            examples/ComprehensiveFeatureDemo
            examples/HD44780Buttons
          enable-deltas-report: true

      - name: Compile CYD example for ESP32
        uses: arduino/compile-sketches@v1
        with:
          fqbn: esp32:esp32:esp32
          platforms: |
            - name: esp32:esp32
              source-url: https://espressif.github.io/arduino-esp32/package_esp32_index.json
          libraries: |
            - source-path: ./
            - name: TFT_eSPI
          sketch-paths: |
            examples/CYDAuroraPanel
          enable-deltas-report: true

      - name: Report size deltas on PRs
        if: github.event_name == 'pull_request'
        uses: arduino/report-size-deltas@v1

  host-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Build host tests
        run: |
          c++ -std=c++11 -Wall -Wextra -pedantic tests/host_tests.cpp -o /tmp/bettermenu_host_tests

      - name: Run host tests
        run: |
          /tmp/bettermenu_host_tests
